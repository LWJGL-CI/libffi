name: LWJGL Build

on:
  push:
    branches:
      - master

env:
  AWS_DEFAULT_REGION: us-east-1
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  S3_PARAMS: --cache-control "public,must-revalidate,proxy-revalidate,max-age=0"

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-latest
    container:
      image: almalinux:8
    strategy:
      fail-fast: false
      matrix:
        ARCH: [x64]
        include:
          - ARCH: x64
            HOST: x86_64-pc-linux-gnu
    defaults:
      run:
        shell: bash
    steps:
      - name: Install git
        run: dnf -y install git
      - name: Clone repository
        run: git clone --depth 3 https://github.com/${{ github.repository }}.git .
      - name: Install build dependencies
        run: |
          dnf -y install epel-release wget
          dnf config-manager --set-enabled powertools
          dnf -y update
          dnf -y install gcc-toolset-15-gcc awscli
      - name: Install libffi dependencies
        run: dnf -y install autoconf automake autoconf libtool texinfo
      - name: Configure build
        run: |
          source /opt/rh/gcc-toolset-15/enable || true
          ./autogen.sh
          ./configure --disable-shared --with-pic --host=${{matrix.HOST}} || (cat */config.log ; exit 1)
      - name: Build
        run: |
          source /opt/rh/gcc-toolset-15/enable || true
          make
      - name: Upload artifact
        run: aws s3 cp ${{matrix.HOST}}/.libs/libffi_convenience.a s3://lwjgl-build/nightly/linux/${{matrix.ARCH}}/core/libffi.a ${{env.S3_PARAMS}}

  linux-cross:
    name: Linux Cross
    runs-on: ${{ matrix.RUNNER }}
    strategy:
      fail-fast: false
      matrix:
        ARCH: [arm32, arm64, ppc64le, riscv64]
        include:
          - ARCH: arm32
            RUNNER: ubuntu-22.04
            CROSS_ARCH: armhf
            TRIPLET: arm-linux-gnueabihf
            GCC: 12
            HOST: arm-unknown-linux-gnueabihf
          - ARCH: arm64
            RUNNER: ubuntu-22.04
            CROSS_ARCH: arm64
            TRIPLET: aarch64-linux-gnu
            GCC: 12
            HOST: aarch64-unknown-linux-gnu
          - ARCH: ppc64le
            RUNNER: ubuntu-22.04
            CROSS_ARCH: ppc64el
            TRIPLET: powerpc64le-linux-gnu
            GCC: 12
            HOST: powerpc64le-unknown-linux-gnu
          - ARCH: riscv64
            RUNNER: ubuntu-24.04
            CROSS_ARCH: riscv64
            TRIPLET: riscv64-linux-gnu
            GCC: 14
            HOST: riscv64-unknown-linux-gnu
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - name: Install dependencies
        run: |
          DEBIAN_FRONTEND=noninteractive sudo apt-get -yq update
          DEBIAN_FRONTEND=noninteractive sudo apt-get -yq install m4 make autoconf automake libtool libltdl-dev texinfo \
            gcc-${{matrix.GCC}}-${{matrix.TRIPLET}} \
            libc6-dev-${{matrix.CROSS_ARCH}}-cross
      - name: Configure build
        run: |
          PATH=$HOME/i/bin:$PATH ./autogen.sh
          ./configure --disable-shared --with-pic CC=${{matrix.TRIPLET}}-gcc-${{matrix.GCC}} --host=${{matrix.HOST}} || (cat */config.log ; exit 1)
      - name: Build
        run: make
      - name: Upload artifact
        run: aws s3 cp ${{matrix.HOST}}/.libs/libffi_convenience.a s3://lwjgl-build/nightly/linux/${{matrix.ARCH}}/core/libffi.a ${{env.S3_PARAMS}}

  freebsd-cross:
    name: FreeBSD Cross
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - name: Start VM
        uses: cross-platform-actions/action@v1.3.0
        with:
          operating_system: freebsd
          architecture: x86-64
          version: '14.4'
          memory: 4G
      - name: Install dependencies
        shell: cpa.sh {0}
        run: sudo pkg install -y m4 gmake automake libtool texinfo
      - name: Configure build
        shell: cpa.sh {0}
        run: |
          ./autogen.sh
          ./configure --disable-shared --with-pic
      - name: Print config failure
        run: cat */config.log
        if: failure()
      - name: Build
        shell: cpa.sh {0}
        run: make
      - name: Upload artifact
        run: aws s3 cp x86_64-unknown-freebsd14.4/.libs/libffi_convenience.a s3://lwjgl-build/nightly/freebsd/x64/core/libffi.a ${{env.S3_PARAMS}}

  macos:
    name: macOS
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        ARCH: [x64, arm64]
        include:
          - ARCH: x64
            DARWIN: 15
            CC: MACOSX_DEPLOYMENT_TARGET=10.11
            CFLAGS: -target x64-apple-darwin -arch x86_64 -mmacosx-version-min=10.11
            LDFLAGS: -target x64-apple-darwin -arch x86_64 -mmacosx-version-min=10.11
            HOST: x86_64
          - ARCH: arm64
            DARWIN: 20
            CC: MACOSX_DEPLOYMENT_TARGET=11.0
            CFLAGS: -target aarch64-apple-darwin -arch arm64 -mmacosx-version-min=11.0
            LDFLAGS: -target aarch64-apple-darwin -arch arm64 -mmacosx-version-min=11.0
            HOST: aarch64
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - name: Install dependencies
        run: brew install automake libtool texinfo
      - name: Configure build
        run: |
          ./autogen.sh
          ${{matrix.CC}} ./configure --disable-shared CC=clang CFLAGS='${{matrix.CFLAGS}}' LDFLAGS='${{matrix.LDFLAGS}}' --target ${{matrix.ARCH}}-apple-darwin${{matrix.DARWIN}} --host=${{matrix.HOST}}-apple-darwin${{matrix.DARWIN}} || (cat */config.log ; exit 1)
      - name: Build
        run: ${{matrix.CC}} make all
      - name: Upload artifact
        run: aws s3 cp ${{matrix.HOST}}-apple-darwin${{matrix.DARWIN}}/.libs/libffi_convenience.a s3://lwjgl-build/nightly/macosx/${{matrix.ARCH}}/core/libffi.a ${{env.S3_PARAMS}}

  windows:
    name: Windows
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        ARCH: [x86, x64, arm64]
        include:
          # -----
          - ARCH: x86
            SOURCE_ARCH: x86
            #VCTOOLS: x86.x64
            MSVC_ARCH: amd64_x86
            #MSVC_ARCH: x86
            MSVC_SH: -m32
            HOST: i686-pc-cygwin
          # -----
          - ARCH: x64
            SOURCE_ARCH: x86
            #VCTOOLS: x86.x64
            MSVC_ARCH: amd64
            MSVC_SH: -m64
            HOST: x86_64-pc-cygwin
          # -----
          - ARCH: arm64
            SOURCE_ARCH: aarch64
            #VCTOOLS: ARM64
            MSVC_ARCH: amd64_arm64
            #MSVC_ARCH: arm64
            MSVC_SH: -marm64
            HOST: aarch64-pc-cygwin
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - name: Install dependencies
        uses: egor-tensin/setup-cygwin@v4
        with:
          #platform: x64
          install-dir: C:\cygwin
          packages: wget autoconf automake libtool
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.MSVC_ARCH }}
#      - name: Install Visual Studio 2026 Build Tools
#        shell: pwsh
#        run: |
#          choco install visualstudio2026buildtools --package-parameters "`
#            --add Microsoft.VisualStudio.Workload.VCTools `
#            --add Microsoft.VisualStudio.Component.VC.Tools.${{matrix.VCTOOLS}} `
#            --includeRecommended `
#            --quiet" `
#            -y `
#            --ignore-package-exit-codes=3010
      - name: Prepare build script
        run: |
          cat > build.sh <<'EOF'
          cd $(cygpath $RUNNER_WORKSPACE)/libffi
          ./autogen.sh
          ./configure \
            CC="$PWD/msvcc.sh -DUSE_STATIC_RTL ${{matrix.MSVC_SH}}" \
            CXX="$PWD/msvcc.sh -DUSE_STATIC_RTL ${{matrix.MSVC_SH}}" \
            LD='link' \
            CPP='cl -nologo -EP' \
            CXXCPP='cl -nologo -EP' \
            CPPFLAGS='-DFFI_BUILDING_DLL -DUSE_STATIC_RTL' \
            NM='dumpbin -symbols' \
            STRIP=':' \
            CONFIGURE_OPTIONS=--disable-shared \
            --host=${{matrix.HOST}} \
            || (cat */config.log ; exit 1)
          cp src/${{matrix.SOURCE_ARCH}}/ffitarget.h include
          make all
          EOF
          echo BUILD SCRIPT
          echo ------------
          cat build.sh
          chmod +x build.sh
        shell: C:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
      - name: Build
        #call "C:\Program Files (x86)\Microsoft Visual Studio\18\BuildTools\Common7\Tools\VsDevCmd.bat" -host_arch=amd64 -arch=${{matrix.MSVC_ARCH}}
        run: C:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr build.sh
      - name: Upload artifact
        run: aws s3 cp ${{matrix.HOST}}\.libs\libffi_convenience.lib s3://lwjgl-build/nightly/windows/${{matrix.ARCH}}/core/libffi.lib ${{env.S3_PARAMS}}
